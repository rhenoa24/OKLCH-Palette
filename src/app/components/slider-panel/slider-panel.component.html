<div class="slider-row">
  <label class="slider-label">L</label>
  <input class="slider slider--lightness"
         type="range"
         min="0"
         max="1"
         step="0.01"
         [value]="lightness()"
         (input)="onLightnessChange($event)" />
  <span class="slider-value">{{ (lightness() * 100).toFixed(0) }}</span>
</div>

<div class="slider-row">
  <label class="slider-label">C</label>
  <input class="slider slider--chroma"
         type="range"
         min="0"
         max="0.4"
         step="0.001"
         [value]="chroma()"
         (input)="onChromaChange($event)" />
  <span class="slider-value">{{ chroma().toFixed(3) }}</span>
</div>

<div class="slider-row">
  <label class="slider-label">H</label>
  <input class="slider slider--hue"
         type="range"
         min="0"
         max="360"
         step="1"
         [value]="hue()"
         (input)="onHueChange($event)" />
  <span class="slider-value">{{ hue().toFixed(0) }}°</span>
</div>
