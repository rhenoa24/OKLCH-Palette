<div class="swatch-row">
  <!--Left swatch: base color + lock indicator-->
  <div class="swatch swatch--base"
       [class.locked]="locked()"
       [style.background-color]="baseOklch()"
       [title]="locked() ? 'Locked — double-click to unlock' : 'Double-click to lock'"
       (dblclick)="onBaseDblClick()">
    <span class="lock-icon">{{ locked() ? '🔒' : '○' }}</span>
  </div>

  <!--Right swatch: selected color-->
  <div class="swatch swatch--selected"
       [style.background-color]="selectedOklch()"
       title="Click to set as base color"
       (click)="onSelectedClick()"></div>
</div>
