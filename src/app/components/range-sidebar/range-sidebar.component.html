<div class="range-sidebar">
  @for (step of steps; track step) {
  <button class="range-step"
          [class.active]="range() === step"
          (click)="selectRange(step)"
          [title]="'Range ' + step + (step === 1 ? ' (widest)' : step === 9 ? ' (narrowest)' : '')">
    {{ step }}
  </button>
  }
</div>
