<div class="hex-input-row">

  <button class="hex-icon"
          [class.unsupported]="!eyedropperSupported"
          [title]="eyedropperSupported ? 'Pick color from screen' : 'Eyedropper not supported in this browser'"
          (click)="onEyedropper()">
    🔍
  </button>

  <input #hexField
         class="hex-input"
         type="text"
         [value]="selectedHex()"
         maxlength="6"
         spellcheck="false"
         autocomplete="off"
         (keydown)="onKeydown($event)"
         (input)="onInput($event)"
         (focus)="onFocus()" />

</div>
