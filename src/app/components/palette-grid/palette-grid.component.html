<div class="palette-grid">
  @for (row of palette(); track $index; let rowIdx = $index) {
  <div class="palette-row">
    @for (cell of row; track $index; let colIdx = $index) {
    <div class="palette-cell"
         [class.center]="isCenter(rowIdx, colIdx)"
         [class.out-of-gamut]="cell.outOfGamut && state.showOutOfGamut()"
         [style.background-color]="'oklch(' + cell.oklch.l + ' ' + cell.oklch.c + ' ' + cell.oklch.h + ')'"
         (click)="onLeftClick(cell)"
         (contextmenu)="onRightClick($event, cell)"></div>
    }
  </div>
  }
</div>
