<div class="app-shell" [style.--ui-scale]="uiScale() / 100">

  <!-- ── Top bar: mode selector ───────────────────────────── -->
  <div class="app-toolbar">
    <app-mode-selector />
  </div>

  <!-- ── Swatch row + HEX input ───────────────────────────── -->
  <div class="app-controls">
    <app-swatch-row />
    <div class="hex-wrapper">
      <app-hex-input />
    </div>
  </div>

  <!-- ── Main area: palette grid OR color wheel ────────────── -->
  <div class="app-main">
    @if (showWheel()) {
    <div class="wheel-area">
      <app-color-wheel />
    </div>
    } @else {
    <div class="grid-area">
      <app-palette-grid />
    </div>
    <!-- Range sidebar sits to the right of the grid -->
    <div class="range-area">
      <app-range-sidebar />
    </div>
    }
  </div>

  <!-- ── Sliders: Hue / L / C ─────────────────────────────── -->
  <div class="app-sliders">
    <app-slider-panel />
  </div>

  <!-- ── History row ──────────────────────────────────────── -->
  <div class="app-history">
    <app-history-row />
  </div>

  <!-- ── Footer ───────────────────────────────────────────── -->
  <div class="app-footer">
    <label class="sync-checkbox">
      <input type="checkbox" /> Sync
    </label>
    <button class="settings-link" (click)="toggleSettings()">Settings &amp; Info</button>
  </div>

  <!-- ── Settings overlay ─────────────────────────────────── -->
  @if (showSettings()) {
  <div class="settings-overlay" (click)="toggleSettings()">
    <div class="settings-popup" (click)="$event.stopPropagation()">
      <app-settings-panel (close)="toggleSettings()" />
    </div>
  </div>
  }

</div>
